<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kraken AI</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js" defer></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
        
        :root {
            --bg-dark: #050a14;
            --bg-panel: #0c1524;
            --bg-input: rgba(12, 21, 36, 0.85);
            --bg-hover: #152238;
            --text-main: #ffffff;
            --text-muted: #6b7fa3;
            --grid-color: rgba(59, 130, 246, 0.03);
            --border-color: rgba(59, 130, 246, 0.2);
            --font-ui: 'Inter', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-ui);
        }

        body {
            display: flex;
            height: 100vh;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px),
                              linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            min-width: 400px;
            transition: all 0.3s ease;
        }

        .right-panel {
            width: 0;
            background-color: var(--bg-panel);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: width 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            overflow: hidden;
            z-index: 10;
        }

        .right-panel.open {
            width: 45vw;
            min-width: 400px;
        }

        #chat-history {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 36px;
            max-width: 840px;
            margin: 0 auto;
            width: 100%;
            scroll-behavior: smooth;
        }

        .welcome-text {
            text-align: center;
            margin-top: 30vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            animation: fadeIn 0.5s ease;
        }
        
        .welcome-text h2 { font-size: 2.2rem; font-weight: 600; color: var(--text-main); }
        .welcome-text p { font-size: 1.1rem; color: var(--text-muted); font-weight: 500; }
        
        .infinity-logo {
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .message-row {
            display: flex;
            flex-direction: column;
            width: 100%;
            animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .user-message {
            align-self: flex-end;
            background-color: #0c1524;
            color: var(--text-main);
            padding: 14px 20px;
            border-radius: 20px 20px 4px 20px;
            max-width: 80%;
            font-size: 0.95rem;
            line-height: 1.6;
            word-wrap: break-word;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .ai-message {
            align-self: flex-start;
            max-width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-left: 4px;
        }

        .ai-text {
            font-size: 0.98rem;
            line-height: 1.7;
            color: #d1d5db;
            word-wrap: break-word;
            overflow-x: auto;
        }

        .ai-text p { margin-bottom: 12px; }
        .ai-text p:last-child { margin-bottom: 0; }
        .ai-text h1, .ai-text h2, .ai-text h3, .ai-text h4 { color: #fff; margin-top: 20px; margin-bottom: 10px; font-weight: 600; }
        .ai-text strong { color: #fff; font-weight: 600; }
        .ai-text ul, .ai-text ol { margin-left: 24px; margin-bottom: 16px; }
        .ai-text li { margin-bottom: 6px; }
        .ai-text code { background: #0c1524; padding: 3px 6px; border-radius: 6px; font-family: var(--font-code); font-size: 0.9em; border: 1px solid var(--border-color); }
        
        .code-container {
            position: relative;
            margin-top: 12px;
            margin-bottom: 16px;
            background: #060e1a;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }
        
        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0c1524;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border-color);
            font-family: var(--font-ui);
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        
        .code-actions { display: flex; gap: 8px; }
        
        .code-action-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }
        
        .code-action-btn:hover { background: var(--text-main); color: var(--bg-dark); }
        
        .ai-text pre {
            padding: 16px;
            overflow-x: auto;
            margin: 0;
            background: transparent;
            border: none;
        }
        
        .ai-text pre code { border: none; padding: 0; background: transparent; font-size: 0.9em; }
        .ai-text table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.9rem; }
        .ai-text th, .ai-text td { border: 1px solid var(--border-color); padding: 10px 14px; text-align: left; }
        .ai-text th { background-color: rgba(255, 255, 255, 0.05); color: #fff; font-weight: 600; }
        .ai-text tr:nth-child(even) { background-color: rgba(255, 255, 255, 0.02); }
        .ai-text blockquote { border-left: 4px solid var(--border-color); padding-left: 12px; margin: 12px 0; color: var(--text-muted); font-style: italic; }

        .chat-image-preview { max-width: 100%; max-height: 250px; border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--border-color); object-fit: cover; display: block; cursor: pointer; transition: opacity 0.2s; background: #000; }
        .chat-image-preview:hover { opacity: 0.85; }
        .file-attachment-pill { display: inline-flex; align-items: center; gap: 8px; background: rgba(255, 255, 255, 0.05); padding: 8px 14px; border-radius: 8px; font-size: 0.85rem; color: var(--text-main); margin-bottom: 10px; border: 1px solid var(--border-color); max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; transition: background 0.2s; }
        .file-attachment-pill:hover { background: rgba(255, 255, 255, 0.1); }

        .pdf-document-wrapper {
            background-color: #ffffff;
            color: #000000;
            border-radius: 8px;
            padding: 40px;
            margin: 20px 0;
            box-shadow: 0 8px 24px rgba(255,255,255,0.05);
            position: relative;
            font-family: Arial, sans-serif;
            border: 1px solid #ddd;
        }
        
        .pdf-document-wrapper h1, .pdf-document-wrapper h2, .pdf-document-wrapper h3, .pdf-document-wrapper p, .pdf-document-wrapper li { color: #000000 !important; margin-bottom: 12px; }
        .download-specific-pdf-btn { display: inline-flex; align-items: center; gap: 8px; background-color: #000000; color: #ffffff; border: 1px solid #444; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: 600; margin-top: 20px; font-size: 0.9rem; transition: background-color 0.2s, transform 0.1s; }
        .download-specific-pdf-btn:hover { background-color: #222; }
        .download-specific-pdf-btn:active { transform: scale(0.97); }

        .thinking-dots { display: flex; gap: 5px; align-items: center; height: 24px; padding: 4px 0; }
        .thinking-dots span { width: 6px; height: 6px; background-color: var(--text-muted); border-radius: 50%; animation: pulse 1.4s infinite ease-in-out both; }
        .thinking-dots span:nth-child(1) { animation-delay: -0.32s; }
        .thinking-dots span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes pulse { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1.2); opacity: 1; background-color: var(--text-main); } }

        .action-bar { display: flex; align-items: center; gap: 6px; margin-top: 4px; opacity: 0; transition: opacity 0.2s; }
        .message-row:hover .action-bar { opacity: 1; }
        .action-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; padding: 6px; border-radius: 6px; }
        .action-btn:hover { color: var(--text-main); background-color: rgba(255, 255, 255, 0.06); }
        .action-btn svg { width: 16px; height: 16px; stroke-width: 1.5; }

        .input-area {
            padding: 0 20px 40px 20px;
            display: flex;
            justify-content: center;
            background: linear-gradient(transparent, var(--bg-dark) 80%);
            position: relative;
        }
        
        .input-container {
            display: flex;
            align-items: flex-end;
            background-color: var(--bg-input);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 10px 14px;
            width: 100%;
            max-width: 780px;
            gap: 10px;
            border: 1px solid var(--border-color);
            transition: border-color 0.3s, box-shadow 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .input-container:focus-within { border-color: rgba(255, 255, 255, 0.4); box-shadow: 0 10px 40px rgba(255,255,255,0.05); }
        
        .icon-btn { background: transparent; border: none; color: var(--text-muted); width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s ease; flex-shrink: 0; margin-bottom: 2px; }
        .icon-btn:hover { background-color: var(--bg-hover); color: var(--text-main); }
        .icon-btn svg { width: 20px; height: 20px; stroke-width: 1.75; }
        
        .code-builder-btn { color: #f59e0b; }
        .code-builder-btn:hover { background-color: rgba(245, 158, 11, 0.1); color: #fbbf24; }
        
        .text-input { flex-grow: 1; background: transparent; border: none; outline: none; color: var(--text-main); font-size: 0.98rem; line-height: 1.5; min-height: 40px; max-height: 200px; padding: 8px 8px; resize: none; overflow-y: auto; }
        .text-input::placeholder { color: #6b7280; }
        
        .send-btn { color: var(--text-muted); }
        .send-btn.active { color: var(--bg-dark); background: var(--text-main); }

        .options-row { display: flex; align-items: center; margin-right: auto; }
        .dropdown { position: relative; display: flex; align-items: center; margin-bottom: 2px; }
        .model-selector-btn { display: flex; align-items: center; gap: 8px; background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 8px 12px; border-radius: 12px; transition: all 0.2s; font-size: 0.9rem; font-weight: 500; }
        .model-selector-btn:hover { background-color: var(--bg-hover); color: var(--text-main); }
        .model-selector-btn svg { width: 16px; height: 16px; stroke-width: 1.5; }
        
        .dropdown-menu { position: absolute; bottom: calc(100% + 12px); left: 0; background-color: #0c1524; border: 1px solid var(--border-color); border-radius: 12px; padding: 6px; width: 250px; display: none; flex-direction: column; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8); z-index: 100; transform-origin: bottom left; }
        .dropdown-menu.show { display: flex; animation: menuPop 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes menuPop { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        .dropdown-item { padding: 10px 12px; display: flex; align-items: center; gap: 12px; cursor: pointer; color: var(--text-main); border: none; background: none; width: 100%; text-align: left; border-radius: 8px; font-size: 0.9rem; transition: background 0.2s; }
        .dropdown-item:hover { background-color: var(--bg-hover); }
        .dropdown-item .icon { color: var(--text-muted); width: 16px; height: 16px; }

        .right-panel-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border-color); background: var(--bg-panel); }
        .right-panel-title { font-weight: 600; font-size: 1rem; display: flex; align-items: center; gap: 8px; }
        .close-panel-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; transition: color 0.2s; display: flex; align-items: center; justify-content: center; }
        .close-panel-btn:hover { color: var(--text-main); }
        #code-runner-frame { flex: 1; width: 100%; border: none; background: #ffffff; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9); z-index: 1000; align-items: center; justify-content: center; padding: 40px; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); animation: fadeIn 0.2s ease; }
        .modal-overlay.show { display: flex; }
        
        .settings-modal { background: #0c1524; border: 1px solid var(--border-color); border-radius: 16px; padding: 30px; width: 100%; max-width: 450px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .settings-modal h3 { margin-bottom: 20px; font-size: 1.2rem; }
        .settings-modal input { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: white; border-radius: 8px; margin-bottom: 20px; font-family: monospace; outline: none; transition: border 0.3s; }
        .settings-modal input:focus { border-color: var(--text-main); }
        .settings-modal-actions { display: flex; justify-content: flex-end; gap: 12px; }
        .btn-secondary { background: transparent; border: 1px solid var(--border-color); color: white; padding: 10px 16px; border-radius: 8px; cursor: pointer; }
        .btn-primary { background: white; border: none; color: black; font-weight: 600; padding: 10px 16px; border-radius: 8px; cursor: pointer; }
        
        .viewer-content { max-width: 90vw; max-height: 90vh; background: #0c1524; border: 1px solid var(--border-color); border-radius: 12px; overflow: auto; padding: 30px; color: var(--text-main); white-space: pre-wrap; font-size: 0.95rem; line-height: 1.6; font-family: monospace; }
        .viewer-content img { max-width: 100%; max-height: 85vh; border-radius: 8px; display: block; margin: 0 auto; }
        .viewer-close { position: absolute; top: 20px; right: 30px; font-size: 40px; color: var(--text-muted); cursor: pointer; transition: color 0.2s; line-height: 1; }
        .viewer-close:hover { color: #fff; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        svg { fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>
<body>

    <div class="main-content">

        <div id="chat-history"></div>
        <input type="file" id="file-upload" accept="image/*,.pdf,.txt,.md,.json,.csv,.html,.js,.css" style="display: none;">
        
        <div class="input-area">
            <div class="input-container">
                <div class="options-row">

                        <div class="dropdown-menu" id="model-menu">
                            <button class="dropdown-item" onclick="selectModel('Gemini 2.5 Flash')">
                                <svg class="icon" viewBox="0 0 24 24"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                                Gemini 2.5 Flash
                            </button>
                            <button class="dropdown-item" onclick="selectModel('Gemini 2.0 Flash')">
                                <svg class="icon" viewBox="0 0 24 24"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                                Gemini 2.0 Flash
                            </button>
                            <button class="dropdown-item" onclick="selectModel('GPT-4.1 Mini')">
                                <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>

                            <button class="dropdown-item" onclick="selectModel('DeepSeek V3')">
                                <svg class="icon" viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                                DeepSeek V3
                            </button>
                        </div>
                    </div>
                    
                    <div class="dropdown">
                        <button class="model-selector-btn" id="mode-toggle" onclick="toggleMenu('mode-menu')">
                            <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2Z"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
                            <span id="current-mode-name">Pro Mode</span>
                        </button>
                        <div class="dropdown-menu" id="mode-menu">
                            <button class="dropdown-item" onclick="selectMode('Pro Mode')">
                                <svg class="icon" viewBox="0 0 24 24"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                                Pro Mode
                            </button>
                            <button class="dropdown-item" onclick="selectMode('Dumb Mode')">
                                <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
                                Dumb Mode
                            </button>
                        </div>
                    </div>
                    
                    <button class="icon-btn" onclick="clearChat()" title="Clear Chat" style="margin-left: 6px;">
                        <svg viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    </button>
                    
                </div>

                <button class="icon-btn" onclick="document.getElementById('file-upload').click()" title="Attach File">
                    <svg viewBox="0 0 24 24"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                </button>
                <textarea class="text-input" id="user-input" placeholder="Message Kraken AI..." rows="1" oninput="autoResize(this)" onkeydown="handleKeyPress(event)"></textarea>
                
                <button class="icon-btn code-builder-btn" onclick="handleCodeBuilder()" title="Peak Code Builder (Dual Model)">
                    <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>

                <button class="icon-btn send-btn" id="send-btn" onclick="handleSend()">
                    <svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>

            </div>
        </div>
    </div>

    <div class="right-panel" id="right-panel">
        <div class="right-panel-header">
            <div class="right-panel-title">
                <svg viewBox="0 0 24 24" width="18" height="18"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                Live Preview
            </div>
            <button class="close-panel-btn" onclick="closeRightPanel()">
                <svg viewBox="0 0 24 24" width="20" height="20"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
        </div>
        <iframe id="code-runner-frame" sandbox="allow-scripts allow-modals allow-forms allow-popups"></iframe>
    </div>

    <div id="viewer-modal" class="modal-overlay">
        <span class="viewer-close" onclick="closeViewer()">&times;</span>
        <div id="viewer-content" class="viewer-content"></div>
    </div>


    <script>
        marked.use({ breaks: true });

        const GEMINI_KEY = "AIzaSyDQBARfLrOBmyZ5eeWcKwr6hg8uwr9mIBc";
        const OPENROUTER_KEY = "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";

        const MODELS = {
            'Gemini 2.5 Flash': { provider: 'gemini', id: 'gemini-2.5-flash-preview-05-20' },
            'Gemini 2.0 Flash': { provider: 'gemini', id: 'gemini-2.0-flash' },
            'GPT-4.1 Mini': { provider: 'openrouter', id: 'openai/gpt-4.1-mini' },
            'DeepSeek V3': { provider: 'openrouter', id: 'deepseek/deepseek-chat-v3-0324:free' },
        };

        let currentUIModel = 'Gemini 2.5 Flash';
        let currentUIMode = 'Pro Mode';
        let isGenerating = false;

        let chatContext = [];
        let chatHistoryHTML = "";

        let fileData = null;

        let baseDataCache = null;
        const fileStorage = {};

        function openRightPanel(codeContent, lang) {
            const panel = document.getElementById('right-panel');

        function processFile(file) {
            fileName = file.name || "Pasted_Image.png";
            if (file.type.startsWith('image/')) {
                document.getElementById('user-input').placeholder = `Processing image...`;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height;
                        const maxDim = 1000; 
                        if (width > height && width > maxDim) { height *= maxDim / width; width = maxDim; } 
                        else if (height > maxDim) { width *= maxDim / height; height = maxDim; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        baseDataCache = canvas.toDataURL('image/jpeg', 0.85); 
                        fileData = "Base64 image loaded. Refer to vision payload.";
                        fileType = 'image';
                        document.getElementById('user-input').placeholder = `Image Attached: ${fileName}`;
                        checkInput();
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            } 
            else if (file.type === 'application/pdf') {
                document.getElementById('user-input').placeholder = `Extracting PDF...`;
                const reader = new FileReader();
                reader.onload = async function() {
                    try {
                        const typedarray = new Uint8Array(this.result);
                        const pdf = await pdfjsLib.getDocument({data: typedarray}).promise;
                        let fullText = '';
                        for (let i = 1; i <= pdf.numPages; i++) {
                            const page = await pdf.getPage(i);
                            const textContent = await page.getTextContent();
                            fullText += `--- Page ${i} ---\n` + textContent.items.map(item => item.str).join(' ') + '\n\n';
                        }
                        fileData = fullText; fileType = 'text'; baseDataCache = null;
                        document.getElementById('user-input').placeholder = `PDF Attached: ${fileName}`;
                    } catch (err) {
                        alert("Error reading PDF content.");
                        document.getElementById('user-input').placeholder = "Message Kraken AI...";
                    } finally { checkInput(); }
                };
                reader.readAsArrayBuffer(file);
            } 
            else {
                const reader = new FileReader();
                reader.onload = (event) => {
                    fileData = event.target.result; fileType = 'text'; baseDataCache = null;
                    document.getElementById('user-input').placeholder = `File Attached: ${fileName}`;
                    checkInput();
                };
                reader.readAsText(file);
            }
        }

        function convertToGeminiFormat(messages) {
            let systemText = '';
            const contents = [];
            for (const msg of messages) {
                if (msg.role === 'system') {
                    systemText = typeof msg.content === 'string' ? msg.content : msg.content[0].text;
                    continue;
                }
                const role = msg.role === 'assistant' ? 'model' : 'user';
                const parts = [];
                if (Array.isArray(msg.content)) {
                    for (const part of msg.content) {
                        if (part.type === 'text') parts.push({ text: part.text });
                        else if (part.type === 'image_url') {
                            const dataUrl = part.image_url.url;
                            const match = dataUrl.match(/^data:(.*?);base64,(.*)$/);
                            if (match) parts.push({ inlineData: { mimeType: match[1], data: match[2] } });
                        }
                    }
                } else {
                    parts.push({ text: msg.content });
                }
                contents.push({ role, parts });
            }
            const body = { contents };
            if (systemText) body.systemInstruction = { parts: [{ text: systemText }] };
            return body;
        }

                    body: JSON.stringify({ model: modelConfig.id, messages })
                });

                if (data.choices && data.choices[0]) return data.choices[0].message.content;
                throw new Error("No response from OpenRouter: " + JSON.stringify(data));

                    <div class="ai-text">${content}</div>
                    <div class="action-bar">
                        <button class="action-btn" title="Download Thread PDF" onclick="downloadPDF(this)">
                            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg>
                        </button>
                        <button class="action-btn" onclick="copyText(this)" title="Copy Text">
                            <svg viewBox="0 0 24 24"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                        </button>
                        <button class="action-btn" onclick="handleSend(true)" title="Regenerate">
                            <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                        </button>
                    </div>
                </div>`;
            chatHistory.appendChild(div);
            window.scrollTo(0, document.body.scrollHeight);
            return div;
        }

        loadChatData();
    </script>
