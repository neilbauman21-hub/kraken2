<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>New Tab</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg: #050a14;
      --surface: #0c1524;
      --surface-hover: #152238;
      --surface-active: #1a2744;
      --border: #1a2744;
      --border-light: #2a4068;
      --text: #ffffff;
      --text-muted: rgba(147, 197, 253, 0.5);
      --accent: #3b82f6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .logo { width: 80px; height: 80px; border-radius: 18px; margin-bottom: 16px; box-shadow: 0 0 40px rgba(59,130,246,0.3); }

    .clock {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #60a5fa, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .date { font-size: 14px; color: var(--text-muted); margin-bottom: 32px; }

    .search-box {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      width: 100%; max-width: 500px;
      margin-bottom: 40px;
    }
    .search-box i { color: var(--accent); font-size: 14px; }
    .search-box input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-size: 14px; font-family: inherit;
    }
    .search-box input::placeholder { color: var(--text-muted); }
    .search-box select {
      background: var(--surface-hover); border: none; border-radius: 6px;
      color: var(--text-muted); padding: 6px 10px; font-size: 12px;
      cursor: pointer; outline: none;
    }

    .shortcuts { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; max-width: 500px; width: 100%; }
    .shortcut { display: flex; flex-direction: column; align-items: center; gap: 8px; text-decoration: none; cursor: pointer; }
    .shortcut-icon {
      width: 52px; height: 52px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .shortcut:hover .shortcut-icon { background: var(--surface-hover); transform: translateY(-2px); border-color: var(--accent); box-shadow: 0 4px 20px rgba(59,130,246,0.15); }
    .shortcut-icon img { width: 22px; height: 22px; filter: brightness(0) invert(1); }
    .shortcut-icon i { font-size: 20px; color: var(--text-muted); }
    .shortcut-label { font-size: 11px; color: var(--text-muted); text-align: center; max-width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .shortcut:hover .shortcut-label { color: var(--accent); }

    .quote { position: fixed; bottom: 24px; font-size: 13px; color: var(--text-muted); max-width: 400px; text-align: center; }

    .loader { position: fixed; inset: 0; background: var(--bg); display: none; align-items: center; justify-content: center; z-index: 100; }
    .loader.show { display: flex; }
    .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader" id="loader"><div class="spinner"></div></div>

  <img src="assets/img/logo.jpg" alt="Kraken" class="logo">
  <div class="clock" id="clock">Kraken Search</div>
  <div class="date" id="date"></div>

  <form class="search-box" id="searchForm">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" id="searchInput" placeholder="Search the depths..." autocomplete="off">
    <select id="engine">
      <option value="https://search.brave.com/search?q=">Brave</option>
      <option value="https://duckduckgo.com/?q=">DuckDuckGo</option>
      <option value="https://www.google.com/search?q=">Google</option>
    </select>
  </form>

  <div class="shortcuts" id="shortcuts">
    <a class="shortcut" data-url="https://youtube.com">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg"></div>
      <span class="shortcut-label">YouTube</span>
    </a>
    <a class="shortcut" data-url="https://github.com">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/github.svg"></div>
      <span class="shortcut-label">GitHub</span>
    </a>
    <a class="shortcut" data-url="https://discord.com">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/discord.svg"></div>
      <span class="shortcut-label">Discord</span>
    </a>
    <a class="shortcut" data-url="https://twitter.com">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/x.svg"></div>
      <span class="shortcut-label">Twitter</span>
    </a>
    <a class="shortcut" data-url="https://reddit.com">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/reddit.svg"></div>
      <span class="shortcut-label">Reddit</span>
    </a>
    <a class="shortcut" data-url="https://spotify.com">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/spotify.svg"></div>
      <span class="shortcut-label">Spotify</span>
    </a>
    <a class="shortcut" data-url="https://netflix.com">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/netflix.svg"></div>
      <span class="shortcut-label">Netflix</span>
    </a>
    <a class="shortcut" data-url="https://twitch.tv">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/twitch.svg"></div>
      <span class="shortcut-label">Twitch</span>
    </a>
    <a class="shortcut" data-url="https://mail.google.com">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/gmail.svg"></div>
      <span class="shortcut-label">Gmail</span>
    </a>
    <div class="shortcut" id="addShortcut">
      <div class="shortcut-icon"><i class="fa-solid fa-plus"></i></div>
      <span class="shortcut-label">Add</span>
    </div>
  </div>

  <div class="quote" id="quote"></div>

  <script>
    const $ = s => document.querySelector(s);
    const nav = url => {
      $('#loader').classList.add('show');
      window.parent?.postMessage({ type: 'navigate', url }, '*');
    };

    function updateDate() {
      const now = new Date();
      $('#date').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    }
    updateDate();
    setInterval(updateDate, 60000);

    $('#searchForm').onsubmit = e => {
      e.preventDefault();
      const q = $('#searchInput').value.trim();
      if (q) nav($('#engine').value + encodeURIComponent(q));
    };

    $('#shortcuts').onclick = e => {
      const shortcut = e.target.closest('.shortcut[data-url]');
      const addBtn = e.target.closest('#addShortcut');
      if (shortcut) { e.preventDefault(); nav(shortcut.dataset.url); }
      else if (addBtn) {
        const name = prompt("Shortcut name:");
        if (!name) return;
        let url = prompt("URL:");
        if (!url) return;
        if (!url.startsWith('http')) url = 'https://' + url;
        const shortcuts = JSON.parse(localStorage.getItem('shortcuts') || '[]');
        shortcuts.push({ name, url });
        localStorage.setItem('shortcuts', JSON.stringify(shortcuts));
        renderCustom();
      }
    };

    function renderCustom() {
      document.querySelectorAll('.custom-shortcut').forEach(e => e.remove());
      const shortcuts = JSON.parse(localStorage.getItem('shortcuts') || '[]');
      const addBtn = $('#addShortcut');
      shortcuts.forEach(s => {
        const div = document.createElement('div');
        div.className = 'shortcut custom-shortcut';
        div.dataset.url = s.url;
        div.innerHTML = `<div class="shortcut-icon"><i class="fa-solid fa-link"></i></div><span class="shortcut-label">${s.name}</span>`;
        addBtn.before(div);
      });
    }

    const quotes = [
      "Release the Kraken.",
      "From the depths, we rise.",
      "The ocean remembers everything.",
      "Navigate the unseen.",
      "Every wave starts beneath the surface.",
      "Ink runs deeper than you think.",
      "Eight arms, infinite reach.",
      "Change the tab title in settings."
    ];
    $('#quote').textContent = quotes[Math.floor(Math.random() * quotes.length)];

    renderCustom();
  </script>
</body>
</html>
